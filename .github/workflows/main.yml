name: CI Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore SportsSln.sln 
    
    - name: Build
      run: dotnet build SportsSln.sln --configuration Release --no-restore 
    
    - name: Test
      run: dotnet test SportsSln.sln --configuration Release --no-build --verbosity normal --logger "trx" --results-directory ./TestResults
    
    - name: Upload test results to GitHub
      uses: actions/upload-artifact@v4
      if: always() 
      with:
        name: test-results
        path: ./TestResults
    
    - name: Publish test results (opcional - para ver no GitHub)
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Test Results
        path: ./TestResults/*.trx
        reporter: dotnet-trx
        fail-on-error: false
