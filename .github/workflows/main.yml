name: CI Pipeline

on:
  workflow_dispatch:

  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore SportsSln.sln  
    
    - name: Build
      run: dotnet build SportsSln.sln --configuration Release --no-restore  
    
    - name: Test
      run: dotnet test SportsSln.sln --configuration Release --no-build --verbosity normal  
    
    - name: Upload test results (if tests fail)
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-results
        path: '**/*.trx'
